<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 118" role="img" aria-labelledby="title desc">
  <title id="title">Tezoro Crypto Intelligence</title>
  <desc id="desc">Tezoro wordmark with Crypto Intelligence tagline.</desc>
  <defs>
    <linearGradient id="tezoroTextGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="0.45" stop-color="#f8fafc" />
      <stop offset="1" stop-color="#9ca3af" />
    </linearGradient>
    <linearGradient id="tezoroLineGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#60a5fa" />
      <stop offset="0.5" stop-color="#e5e7eb" />
      <stop offset="1" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="softShadow" x="-6%" y="-20%" width="112%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>
  <rect x="0" y="20" width="3" height="78" rx="1.5" fill="#d1d5db" opacity="0.75" />
  <text
    x="40"
    y="65"
    fill="url(#tezoroTextGradient)"
    filter="url(#softShadow)"
    font-family="Inter, Montserrat, Arial, Helvetica, sans-serif"
    font-size="58"
    font-weight="900"
    letter-spacing="7"
  >TEZORO</text>
  <line x1="40" y1="88" x2="76" y2="88" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" />
  <line x1="478" y1="88" x2="522" y2="88" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" />
  <text
    x="90"
    y="94"
    fill="#a5f3fc"
    font-family="Inter, Montserrat, Arial, Helvetica, sans-serif"
    font-size="19"
    font-weight="800"
    letter-spacing="7"
  >CRYPTO INTELLIGENCE</text>
</svg>
